---
- name: Setup base packages on all hosts
  hosts: all
  become: true
  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      tags: [setup]
  roles:
    - { role: geerlingguy.pip, tags: [setup] }
    - { role: geerlingguy.docker, tags: [setup] }

- name: Deploy Redmine and monitoring on webservers
  hosts: webservers
  become: true
  roles:
    - { role: datadog.datadog, become: true, tags: [monitoring] }

  tasks:
    - name: Create .env file from template
      ansible.builtin.template:
        src: templates/redmine.env.j2
        dest: /home/zholnik/redmine.env
        mode: '0600'
      tags: [deploy]

    - name: Deploy Redmine container
      community.docker.docker_container:
        name: redmine
        image: redmine:latest
        state: started
        restart_policy: always
        published_ports:
          - "{{ redmine_port }}:3000"
        env_file: /home/zholnik/redmine.env
      tags: [deploy]
